apiVersion: batch/v1
kind: Job
metadata:
  name: example-job
spec:
  template:
    spec:
      containers:
        - name: example
          image: busybox
          command: ["echo", "Hello, World!"]
      restartPolicy: Never
  backoffLimit: 4
  parllelism: 2
  completions: 2
  activeDeadlineSeconds: 5
