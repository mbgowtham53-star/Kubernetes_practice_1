apiVersion: v1
kind: Pod
metadata:
  name: hostpath-pod
spec:
  containers:
    - name: ip-app
      image: harshajain/ip_app
      ports:
        - containerPort: 80
  volumeMounts:
    - name: hostpath-volume
      mountPath: /app/volume
  volumes:
    - name: hostpath-volume
      hostPath:
        path: /home/ubuntu/hostpath-data
        type: DirectoryOrCreate
